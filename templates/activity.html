<!DOCTYPE html>

<html>

<head>

    <title>
        Forecast Result
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body
style="
background-color:#f1f8e9;
font-family:Arial;
">

    <!-- TITLE -->

    <h1 class="text-center mt-5 text-success">

        🌦 Forecast Result

    </h1>

    <h3 class="text-center mt-3">

        Crop : {{ crop_name }}

    </h3>

    <h4 class="text-center mb-5">

        Activity : {{ activity }}

    </h4>

    <!-- TABLE -->

    <div class="container">

        <table class="table table-bordered table-striped text-center shadow">

            <thead class="table-success">

                <tr>

                    <th>Date</th>

                    <th>Temperature</th>

                    <th>Humidity</th>

                    <th>Wind</th>

                    <th>Rainfall</th>

                    <th>Decision</th>

                </tr>

            </thead>

            <tbody>

                {% for item in forecast_data %}

                <tr>

                    <td>

                        {{ item.date }}

                    </td>

                    <td>

                        {{ item.temp }} °C

                    </td>

                    <td>

                        {{ item.humidity }} %

                    </td>

                    <td>

                        {{ item.wind }} m/s

                    </td>

                    <td>

                        {{ item.rainfall }} mm

                    </td>

                    <td>

                        {{ item.decision }}

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
