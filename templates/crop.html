<!DOCTYPE html>

<html>

<head>

    <title>
        {{ crop_name }}
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body
style="
background-color:#fff8e1;
font-family:Arial;
">

    <!-- TITLE -->

    <h1 class="text-center mt-5 text-success">

        🌱 {{ crop_name }}

    </h1>

    <p class="text-center mt-3">

        Select Agricultural Activity

    </p>

    <!-- ACTIVITY SECTION -->

    <div class="container mt-5">

        <div class="row">

            {% for activity in activities %}

            <div class="col-md-4 mb-4">

                <div class="card shadow-lg h-100">

                    <div class="card-body text-center">

                        <h4 class="mb-4">

                            {{ activity }}

                        </h4>

                        <a
                        href="/location/{{ crop_name }}/{{ activity }}"
                        class="btn btn-warning">

                            Select

                        </a>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
