<!DOCTYPE html>

<html>

<head>

    <title>
        {{ category_name }}
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body
style="
background-color:#f1f8e9;
font-family:Arial;
">

    <!-- TITLE -->

    <h1 class="text-center mt-5 text-success">

        🌾 {{ category_name }}

    </h1>

    <p class="text-center mt-3">

        Select Crop

    </p>

    <!-- CROP SECTION -->

    <div class="container mt-5">

        <div class="row">

            {% for crop in crops %}

            <div class="col-md-4 mb-4">

                <div class="card shadow-lg h-100">

                    <div class="card-body text-center">

                        <h3 class="mb-4">

                            {{ crop }}

                        </h3>

                        <a
                        href="/crop/{{ crop }}"
                        class="btn btn-primary">

                            Select

                        </a>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
