<!DOCTYPE html>

<html>

<head>

    <title>
        Enter Location
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body
style="
background-color:#f3e5f5;
font-family:Arial;
">

    <div class="container mt-5">

        <h1 class="text-center text-primary mb-5">

            📍 Enter Location

        </h1>

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg">

                    <div class="card-body p-5">

                        <form
                        action="/forecast"
                        method="POST">

                            <input
                            type="hidden"
                            name="crop_name"
                            value="{{ crop_name }}">

                            <input
                            type="hidden"
                            name="activity"
                            value="{{ activity }}">

                            <!-- LATITUDE -->

                            <div class="mb-4">

                                <label class="form-label">

                                    Latitude

                                </label>

                                <input
                                type="text"
                                name="latitude"
                                class="form-control"
                                required>

                            </div>

                            <!-- LONGITUDE -->

                            <div class="mb-4">

                                <label class="form-label">

                                    Longitude

                                </label>

                                <input
                                type="text"
                                name="longitude"
                                class="form-control"
                                required>

                            </div>

                            <!-- BUTTON -->

                            <div class="text-center">

                                <button
                                type="submit"
                                class="btn btn-primary btn-lg">

                                    Check Forecast

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
